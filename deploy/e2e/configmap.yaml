apiVersion: v1
kind: ConfigMap
metadata:
  name: nsx-ncp-operator-config
  namespace: nsx-system-operator
data:
  ncp.ini: |
    [DEFAULT]
    [coe]
    cluster = k8scluster
    enable_snat = false
    [ha]
    enable = true
    [k8s]
    client_token_file = /var/run/secrets/kubernetes.io/serviceaccount/token
    ca_file = /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    [nsx_node_agent]
    mtu = 1500
    [nsx_v3]
    nsx_api_managers = nsx-mock.nsx-system.svc:8443
    insecure = True
    container_ip_blocks = 192.168.0.0/16
    tier0_gateway = fake-t0-gateway
    [vc]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fake-os-release
  namespace: nsx-system-operator
data:
  os-release: |
    NAME="Ubuntu"
    ID=ubuntu

