# Temporary trigger to verify action on PR
name: E2E Test
on:
  push:
    branches:
      - e2e-framework-setup
  workflow_dispatch:
#on:
#  pull_request:
#    branches:
#      - main

jobs:
  test-e2e:
    name: End-to-End Test
    runs-on: ubuntu-latest
    steps:
      - name: Check-out code
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v4
        with:
          go-version: 1.26.2
          cache: false

      - name: Log in to Docker Hub
        env:
          DOCKER_USER_ENV: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS_ENV: ${{ secrets.DOCKER_PASSWORD }}
        
        if: ${{ env.DOCKER_USER_ENV != '' && env.DOCKER_PASS_ENV != '' }}

        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create Kind Cluster
        run: make kind-start

      - name: Build Test Images
        run: make build-test-images

      - name: Load Images into Kind
        run: make load-images

      - name: Deploy Operator and Mock NSX
        run: make deploy-e2e

      - name: Run E2E Test Suite
        run: make test-e2e-local

      - name: Clean up Kind Cluster
        if: always()
        run: make kind-stop
